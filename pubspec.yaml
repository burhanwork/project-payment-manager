name: project_payment_manager
description: "Project Payment Manager - projects, payments and approvals"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

  # HTTP & Networking
  http: ^1.2.1
  web_socket_channel: ^3.0.1
  socket_io_client: ^3.0.0
  shared_preferences: ^2.3.4

  # State Management
  flutter_riverpod: ^2.6.1

  # Charts
  fl_chart: ^0.70.2

  # Animations
  flutter_animate: ^4.5.2
  flutter_staggered_animations: ^1.1.1

  # Local Database
  sqflite: ^2.4.2

  # Utilities
  intl: ^0.20.2
  image_picker: ^1.1.2
  uuid: ^4.5.1
  crypto: ^3.0.6
  path_provider: ^2.1.5
  google_fonts: ^6.2.1
  gal: ^1.1.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_native_splash:
  color: "#0A1540"
  color_dark: "#0A1540"
  android: true
  ios: true
  android_12:
    color: "#0A1540"
    icon_background_color: "#0A1540"
